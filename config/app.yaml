llm:
  provider: openrouter
  model: xiaomi/mimo-v2-flash # Main conversational intelligence - ultra cheap
  followup_model: xiaomi/mimo-v2-flash # Auto-followup messages (same model)
  state_model: mistralai/mistral-nemo # Fast model for state resolution
  image_model: x-ai/grok-4-fast # Image tag generation
  image_model_reasoning: true # Disable reasoning to reduce costs
  memory_model: xiaomi/mimo-v2-flash # Memory extraction - uncensored, cheap, decent quality with good prompt
  decision_model: mistralai/ministral-3b # Fast, uncensored model for image decisions
  summary_model: mistralai/ministral-3b # Fast, cheap model for context summarization
  temperature: 0.7
  max_tokens: 300
  timeout_sec: 40

image:
  provider: runpod
  width: 832
  height: 1216
  steps: 25
  cfg_scale: 7
  sampler_name: euler
  poll_interval_sec: 2.0
  poll_timeout_sec: 60
  quality_prompt: "masterpiece, best quality, absurdres, newest, highres"
  negative_prompt: "lowres, (bad), worst quality, bad quality, bad anatomy, bad hands, extra digits, fewer digits, multiple views, extra, missing, text, error, jpeg artifacts, watermark, unfinished, displeasing, oldest, signature, username, scan, comic, greyscale, monochrome, 1boy, male_focus"

limits:
  text_per_min: 20
  image_per_min: 5
  max_history_messages: 12
  batch_delay_seconds: 3 # Delay before processing to allow message batching

webhooks:
  image_callback_secret: "${IMAGE_CALLBACK_SECRET}"

logging:
  level: INFO

features:
  allow_groups: false

miniapp:
  menu_button_name: "App"
