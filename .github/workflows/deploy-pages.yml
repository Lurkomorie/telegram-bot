name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "miniapp/**"
      - "analytics-dashboard/**"

jobs:
  deploy-miniapp:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy Mini App
    environment: "Telegram Bots / production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install & Build
        working-directory: miniapp
        env:
          VITE_API_BASE_URL: https://telegram-bot-production-5987.up.railway.app
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy miniapp/dist --project-name=telegram-bot-miniapp-dyr --branch=production

  deploy-analytics:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy Analytics Dashboard
    environment: "Telegram Bots / production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: analytics-dashboard/package-lock.json

      - name: Install & Build
        working-directory: analytics-dashboard
        env:
          VITE_API_BASE_URL: https://telegram-bot-production-5987.up.railway.app
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy analytics-dashboard/dist --project-name=telegram-bot-analytics --branch=production
